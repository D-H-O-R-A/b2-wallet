<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>B2 Wallet Extension</title>
  <style>
    :root {
      --bg-dark: #070913;
      --color-primary: #f59e0b;
      --text-primary: #ffffff;
      --radius-md: 12px;
    }

    body {
      width: 360px;
      height: 500px;
      margin: 0;
      background-color: var(--bg-dark);
      font-family: 'Exo 2', sans-serif;
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: var(--color-primary);
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      border: none;
      color: #000;
      font-weight: bold;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--color-primary);
      color: var(--color-primary);
    }

    .footer {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: auto;
    }
  </style>
</head>

<body>
  <div class="logo">B2 WALLET</div>
  <p style="text-align: center; font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 30px;">
    Auto-Custódia Multichain
  </p>

  <button class="btn" id="btn-popup-open">Abrir Carteira Completa</button>
  <button class="btn btn-outline" id="btn-popup-lock">Bloquear Extensão</button>

  <div class="footer">
    Desenvolvido por better2better.com.br
  </div>

  <script src="popup.js"></script>
</body>

</html>
